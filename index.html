<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Queen Habiba</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #fdf2f8; overflow-x: hidden; margin: 0; }
        .handwritten { font-family: 'Caveat', cursive; }
        .envelope-wrapper { display: none; opacity: 0; margin-top: 2rem; }
        .envelope-classic {
            width: 250px; height: 170px; background: #fbcfe8; border-radius: 10px;
            position: relative; cursor: pointer; margin: 0 auto;
            box-shadow: 0 15px 35px rgba(219, 39, 119, 0.2);
        }
        .envelope-classic::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border-left: 125px solid transparent; border-right: 125px solid transparent;
            border-top: 90px solid #f9a8d4; border-radius: 10px 10px 0 0;
        }
        .heart-icon { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); z-index: 10; font-size: 2.5rem; }
        .floating { animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        .hidden-section { display: none !important; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <div id="step-1" class="text-center w-full max-w-lg">
        <h1 id="typing-text" class="handwritten text-4xl text-pink-600 min-h-[60px]"></h1>
        <div class="envelope-wrapper" id="envelope-div">
            <div class="envelope-classic floating" onclick="startSurprise()">
                <div class="heart-icon">❤️</div>
            </div>
            <p class="mt-4 text-pink-400 font-semibold animate-pulse">Click the heart to open</p>
        </div>
    </div>

    <div id="step-2" class="hidden-section fixed inset-0 bg-pink-500 z-50 flex flex-col items-center justify-center p-6 text-white text-center">
        <h2 class="handwritten text-5xl md:text-7xl mb-6">Surprise for Habiba!</h2>
        <p class="text-xl mb-10 opacity-90">I made this especially for you...</p>
        <button onclick="finalReveal()" class="bg-white text-pink-600 px-12 py-4 rounded-full font-bold text-2xl shadow-2xl hover:scale-110 transition-transform">
            See attachment ✨
        </button>
    </div>

    <div id="step-3" class="hidden-section w-full max-w-5xl py-12">
        <div class="bg-white rounded-[40px] p-8 shadow-2xl border-4 border-pink-100 text-center mb-16 mx-4">
            <h2 class="handwritten text-4xl text-pink-600 mb-6">My Soul Habiba ❤️</h2>
            <p id="final-message" class="text-gray-700 text-lg leading-relaxed italic"></p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 px-6">
            <div class="bg-white p-3 rounded-2xl shadow-lg transform rotate-2">
                <img src="1.jpg.JPG" class="rounded-xl w-full h-72 object-cover" onerror="this.src='https://via.placeholder.com/400x500?text=Habiba+1'">
                <p class="handwritten text-xl text-pink-500 mt-2 text-center">Smartest</p>
            </div>
            <div class="bg-white p-3 rounded-2xl shadow-lg transform -rotate-2">
                <img src="2.jpg.JPG" class="rounded-xl w-full h-72 object-cover" onerror="this.src='https://via.placeholder.com/400x500?text=Habiba+2'">
                <p class="handwritten text-xl text-pink-500 mt-2 text-center">Most Beautiful</p>
            </div>
            <div class="bg-white p-3 rounded-2xl shadow-lg transform rotate-1">
                <img src="3.jpg.JPG" class="rounded-xl w-full h-72 object-cover" onerror="this.src='https://via.placeholder.com/400x500?text=Habiba+3'">
                <p class="handwritten text-xl text-pink-500 mt-2 text-center">Best Girl Ever</p>
            </div>
        </div>
    </div>

    <script>
        // تأثير الكتابة في البداية
        const text = "hey Habiba! you've got a new surprise/";
        let i = 0;
        function type() {
            if (i < text.length) {
                document.getElementById("typing-text").innerHTML += text.charAt(i);
                i++;
                setTimeout(type, 100);
            } else {
                document.getElementById("envelope-div").style.display = "block";
                gsap.to("#envelope-div", { opacity: 1, duration: 1 });
            }
        }
        window.onload = type;

        // الانتقال للمرحلة الثانية
        function startSurprise() {
            document.getElementById('step-1').classList.add('hidden-section');
            document.getElementById('step-2').classList.remove('hidden-section');
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
        }

        // الانتقال للمرحلة النهائية
        function finalReveal() {
            document.getElementById('step-2').classList.add('hidden-section');
            document.getElementById('step-3').classList.remove('hidden-section');
            window.scrollTo(0, 0);
            
            // انيميشن القصاصات الملونة
            var duration = 5 * 1000;
            var end = Date.now() + duration;
            (function frame() {
              confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 } });
              confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 } });
              if (Date.now() < end) { requestAnimationFrame(frame); }
            }());

            typeFinal();
        }

        function typeFinal() {
            const msg = "Happy birthday, my soul. I love you, I’ve always loved you, and I’ll keep loving you forever. You are the most beautiful thing in the world; I wish we could always stay together. You are the most precious thing in my life and my entire world. ❤️";
            let j = 0;
            function write() {
                if (j < msg.length) {
                    document.getElementById("final-message").innerHTML += msg.charAt(j);
                    j++;
                    setTimeout(write, 40);
                }
            }
            write();
        }
    </script>
</body>
</html>
