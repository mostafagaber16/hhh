<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Queen Habiba</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Poppins', sans-serif; background: #fff5f7; scroll-behavior: smooth; overflow-x: hidden; }
        .cursive { font-family: 'Dancing Script', cursive; }
        .img-card { transition: transform 0.3s; }
        .img-card:hover { transform: scale(1.05); }
        
        @keyframes slowFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .slow-floating { animation: slowFloat 4s ease-in-out infinite; }

        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .floating { animation: floating 3s ease-in-out infinite; }
        
        /* Annoying Escape Button Styling */
        #no-btn { 
            position: absolute; 
            transition: all 0.15s ease; 
            z-index: 100; 
            cursor: pointer;
            border: none;
            background: none;
        }
        
        /* Heart Rain Background */
        .heart-rain-container {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: 1;
        }
        .rain-heart {
            position: absolute;
            top: -10vh;
            opacity: 0;
            animation: fall linear forwards;
        }
        @keyframes fall {
            to {
                transform: translateY(110vh) rotate(360deg);
                opacity: 0.8;
            }
        }

        /* Message Heart Background - THE BIG RED HEART */
        .message-heart {
            background-color: #ef4444; 
            width: 95%;
            max-width: 550px;
            padding: 60px 40px;
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            box-shadow: 0 15px 40px rgba(239, 68, 68, 0.5);
            position: relative;
            transform: scale(0);
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .message-heart.open { transform: scale(1); }
        .message-heart::before,
        .message-heart::after {
            content: "";
            position: absolute;
            background-color: #ef4444;
            border-radius: 50%;
            z-index: -1;
        }
        .message-heart::before { width: 220px; height: 220px; top: -90px; left: 30px; }
        .message-heart::after { width: 220px; height: 220px; top: -90px; right: 30px; }

        #typewriter-text::after {
            content: "|";
            animation: blink 1s infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="rain-container" class="heart-rain-container"></div>

    <div class="fixed top-4 left-1/2 -translate-x-1/2 z-50 slow-floating">
        <div class="bg-pink-100 px-6 py-2 rounded-full shadow-md flex items-center space-x-2 border border-pink-200">
            <span class="text-pink-500">💖</span>
            <span class="cursive text-2xl text-pink-600">Happy Birthday Habiba</span>
            <span class="text-pink-500">💖</span>
        </div>
    </div>

    <section class="h-screen flex flex-col items-center justify-center bg-pink-50 text-center p-4 relative">
        <h2 id="instruction" class="cursive text-pink-600 font-bold mb-8 floating text-4xl mt-20">Habiba, someone loves you more than you can imagine... <br> <span class="text-xl font-sans text-pink-400 mt-2 block">(Open the Envelope)</span></h2>
        
        <div class="relative cursor-pointer" onclick="openShow()" id="envelope-container">
            <div class="w-72 h-44 bg-pink-500 rounded-b-xl shadow-2xl relative transition-transform duration-300 hover:scale-105">
                <div id="envelope-top" class="absolute top-0 left-0 w-0 h-0 border-l-[144px] border-l-transparent border-r-[144px] border-r-transparent border-t-[90px] border-t-pink-400 origin-top transition-transform duration-700 ease-in-out z-10"></div>
                <div class="absolute inset-0 flex items-center justify-center z-0">
                    <span class="text-white text-5xl">💌</span>
                </div>
                <div class="absolute bottom-4 right-4 bg-white/20 p-2 rounded-full text-xs text-white">Tap to Open</div>
            </div>
        </div>
    </section>

    <section id="photo-section" class="hidden min-h-screen py-24 px-4 bg-white">
        <div class="max-w-4xl mx-auto grid md:grid-cols-3 gap-8">
            <div class="img-card text-center">
                <div class="rounded-2xl overflow-hidden shadow-xl mb-4 h-80 bg-pink-50 border-4 border-pink-100">
                    <img src="1.jpg.JPG" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/400x600?text=My+Queen'">
                </div>
                <h3 class="cursive text-2xl text-pink-600">The Smartest Girl Ever</h3>
            </div>
            <div class="img-card text-center">
                <div class="rounded-2xl overflow-hidden shadow-xl mb-4 h-80 bg-pink-50 border-4 border-pink-100">
                    <img src="2.jpg.JPG" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/400x600?text=Habiba'">
                </div>
                <h3 class="cursive text-2xl text-pink-600">The Most Beautiful Girl Ever</h3>
            </div>
            <div class="img-card text-center">
                <div class="rounded-2xl overflow-hidden shadow-xl mb-4 h-80 bg-pink-50 border-4 border-pink-100">
                    <img src="3.jpg.JPG" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/400x600?text=My+Everything'">
                </div>
                <h3 class="cursive text-2xl text-pink-600">The Best Girl Ever</h3>
            </div>
        </div>

        <div class="text-center mt-20 px-4">
            <h2 class="cursive text-5xl md:text-6xl text-pink-500 leading-tight">Habiba is the best girl in everything <br> and at all times.</h2>
        </div>

        <div class="flex justify-center mt-16">
            <button onclick="showMessage()" class="bg-pink-500 text-white px-10 py-4 rounded-full shadow-lg hover:bg-pink-600 transition-all hover:scale-110 text-xl font-bold flex items-center space-x-2">
                <span>A Message for Habiba</span>
                <span>❤️</span>
            </button>
        </div>
    </section>

    <div id="message-modal" class="fixed inset-0 bg-black/80 hidden items-center justify-center p-4 z-50 overflow-hidden">
        <div class="message-heart text-center" id="message-heart-element">
            <h2 class="cursive text-4xl text-white mb-6">Dear Habiba ❤️</h2>
            <p id="typewriter-text" class="text-white leading-relaxed text-xl mb-8 font-medium min-h-[220px]"></p>
            
            <div class="flex justify-center h-20 relative">
                <button id="no-btn">
                   <div class="flex flex-col items-center">
                       <span class="text-5xl">🥺</span>
                       <span class="text-white text-xs font-bold uppercase tracking-widest mt-1">Close</span>
                   </div>
                </button>
            </div>
        </div>
    </div>

    <script>
        const rainContainer = document.getElementById('rain-container');
        const rainColors = ['#ff4d4d', '#ff7675', '#d63031', '#fab1a0', '#ff758c'];
        
        // Updated Message
        const fullText = "Happy birthday, my soul... I loved you then, I love you now, and I will love you until my very last breath. You are the most beautiful thing in this world, and I hope we stay together forever. You are my everything. ❤️";

        function createRainHeart() {
            const heart = document.createElement('div');
            heart.classList.add('rain-heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 3 + 's';
            heart.style.fontSize = Math.random() * 15 + 10 + 'px';
            heart.style.color = rainColors[Math.floor(Math.random() * rainColors.length)];
            rainContainer.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 6000);
        }
        setInterval(createRainHeart, 300);

        function openShow() {
            document.getElementById('envelope-top').style.transform = 'rotateX(180deg)';
            gsap.to("#envelope-container", { scale: 0, opacity: 0, duration: 0.5, delay: 0.7, ease: "back.in(1.7)" });
            
            setTimeout(() => {
                confetti({ particleCount: 200, spread: 80, origin: { y: 0.6 } });
                document.getElementById('photo-section').classList.remove('hidden');
                gsap.from("#photo-section", { opacity: 0, y: 100, duration: 1 });
                setTimeout(() => {
                    window.scrollTo({ top: window.innerHeight, behavior: 'smooth' });
                }, 200);
            }, 800);
        }

        function typeWriter() {
            let i = 0;
            const textElement = document.getElementById('typewriter-text');
            textElement.innerHTML = "";
            function type() {
                if (i < fullText.length) {
                    textElement.innerHTML += fullText.charAt(i);
                    i++;
                    setTimeout(type, 45);
                }
            }
            type();
        }

        function showMessage() {
            const modal = document.getElementById('message-modal');
            const heartElement = document.getElementById('message-heart-element');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            
            setTimeout(() => {
                heartElement.classList.add('open');
                setTimeout(typeWriter, 500);
            }, 50);
            
            // Reset button to center of the heart bottom
            noBtn.style.position = 'absolute';
            noBtn.style.left = '50%';
            noBtn.style.top = '0';
            noBtn.style.transform = 'translateX(-50%)';
        }

        // The "Annoying" Escape Logic for the Emoji Button
        const noBtn = document.getElementById('no-btn');
        noBtn.addEventListener('mouseover', () => {
            const maxX = window.innerWidth - 100;
            const maxY = window.innerHeight - 100;
            
            const randomX = Math.random() * maxX;
            const randomY = Math.random() * maxY;
            
            noBtn.style.position = 'fixed';
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
            noBtn.style.transform = 'none';
            
            // Add a jumpy effect
            gsap.to(noBtn, { scale: 1.3, duration: 0.1, yoyo: true, repeat: 1 });
        });
    </script>
</body>
</html>
